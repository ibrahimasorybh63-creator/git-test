<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="bootstrap.min.css">
    <title>calculatrice windows</title>
</head>
<body>
   <div class="container bg-dark w-50">
    <div class="row text-white mt-2">
        <h4>Calculatrice</h4>
        <h3>Scientifique</h3>
        <div class="form-group">
            <input type="text" id="resultat" placeholder="0" class="text-end w-100 p-4" readonly>
        </div>
        <div class="form-group mt-3">
            <table>
                <tr>
                    <td>
                        <input type="submit" id="DEG" value="DEG" class="btn btn-dark text-white ms-3">
                    </td>
                    <td>
                        <input type="submit" id="F-E" value="F-E" class="btn btn-dark text-white ms-3">
                    </td>
                </tr>
                <tr>
                    <td>
                        <input type="submit" id="MC" value="MC" class="btn btn-dark text-white ms-3">
                    </td>
                    <td>
                        <input type="submit" id="MR" value="MR" class="btn btn-dark text-white ms-3">
                    </td>
                    <td>
                        <input type="submit" id="M+" value="M+" class="btn btn-dark text-white ms-3">
                    </td>
                    <td>
                        <input type="submit" id="M-" value="M-" class="btn btn-dark text-white ms-3">
                    </td>
                    <td>
                        <input type="submit" id="MS" value="MS" class="btn btn-dark text-white ms-3">
                    </td>
                </tr>
            </table>
            <hr>
        </div>
    </div>
    <div class="row">
        <div class="form-group">
            <table style="width: 100%;">
                <tr>
                    <td><input type="submit" id="second" value="2nd" class="btn btn-dark ps-5"></td>
                    <td><input type="submit" id="pi" value="&pi;" class="btn btn-dark pe-5"></td>
                    <td><input type="submit" id="e" value="e" class="btn btn-dark pe-5"></td>
                    <td><input type="submit" id="clear" value="c" class="btn btn-dark pe-5"></td>
                    <td><input type="submit" id="retour" value="⇐" class="btn btn-dark pe-5"></td>
                </tr>
                <tr>
                    <td><input type="submit" id="carre" value="x²" class="btn btn-dark ps-5"></td>
                    <td><input type="submit" id="inverse" value="1/x" class="btn btn-dark pe-5"></td>
                    <td><input type="submit" id="absolue" value="|x|" class="btn btn-dark pe-5"></td>
                    <td><input type="submit" id="expo" value="exp" class="btn btn-dark pe-5"></td>
                    <td><input type="submit" id="modulo" value="mod" class="btn btn-dark pe-5"></td>
                </tr>
                <tr>
                    <td><input type="submit" id="racine carre" value="²√x" class="btn btn-dark ps-5"></td>
                    <td><input type="submit" id="par1" value="(" class="btn btn-dark pe-5"></td>
                    <td><input type="submit" id="par2" value=")" class="btn btn-dark pe-5"></td>
                    <td><input type="submit" id="factorielle" value="n!" class="btn btn-dark pe-5"></td>
                    <td><input type="submit" id="division" value="÷" class="btn btn-dark pe-5"></td>
                </tr>
                <tr>
                    <td><input type="submit" id="puissance" value="x^y" class="btn btn-dark ps-5"></td>
                    <td><input type="submit" id="sept" value="7" class="btn btn-dark pe-5"></td>
                    <td><input type="submit" id="huit" value="8" class="btn btn-dark pe-5"></td>
                    <td><input type="submit" id="neuf" value="9" class="btn btn-dark pe-5"></td>
                    <td><input type="submit" id="multiplication" value="x" class="btn btn-dark pe-5"></td>
                </tr>
                <tr>
                    <td><input type="submit" id="puiss de dix" value="10^x" class="btn btn-dark ps-5"></td>
                    <td><input type="submit" id="quatre" value="4" class="btn btn-dark pe-5"></td>
                    <td><input type="submit" id="cinq" value="5" class="btn btn-dark pe-5"></td>
                    <td><input type="submit" id="six" value="6" class="btn btn-dark pe-5"></td>
                    <td><input type="submit" id="soustraction" value="-" class="btn btn-dark pe-5"></td>
                </tr>
                <tr>
                    <td><input type="submit" id="log" value="log" class="btn btn-dark ps-5"></td>
                    <td><input type="submit" id="un" value="1" class="btn btn-dark pe-5"></td>
                    <td><input type="submit" id="deux" value="2" class="btn btn-dark pe-5"></td>
                    <td><input type="submit" id="trois" value="3" class="btn btn-dark pe-5"></td>
                    <td><input type="submit" id="addition" value="+" class="btn btn-dark pe-5"></td>
                </tr>
                <tr>
                    <td><input type="submit" id="ln" value="ln" class="btn btn-dark ps-5"></td>
                    <td><input type="submit" id="negation" value="+/-" class="btn btn-dark pe-5"></td>
                    <td><input type="submit" id="zero" value="0" class="btn btn-dark pe-5"></td>
                    <td><input type="submit" id="virgule" value="," class="btn btn-dark pe-5"></td>
                    <td><input type="submit" id="egal" value="=" class="btn btn-dark pe-5"></td>
                </tr>
            </table>
        </div>
    </div>
   </div>
</body>
<script>
    var nbr1,nbr2,op
const $ = document.getElementById.bind(document);
$('un').addEventListener('click',function(){
    $('resultat').value = $('resultat').value + "1"
});
$('deux').addEventListener('click',function(){
    $('resultat').value = $('resultat').value + "2"
});
$('trois').addEventListener('click',function(){
    $('resultat').value = $('resultat').value + "3"
});
$('quatre').addEventListener('click',function(){
    $('resultat').value = $('resultat').value + "4"
});
$('cinq').addEventListener('click',function(){
    $('resultat').value = $('resultat').value + "5"
});
$('six').addEventListener('click',function(){
    $('resultat').value = $('resultat').value + "6"
});
$('sept').addEventListener('click',function(){
    $('resultat').value = $('resultat').value + "7"
});
$('huit').addEventListener('click',function(){
    $('resultat').value = $('resultat').value + "8"
});
$('neuf').addEventListener('click',function(){
    $('resultat').value = $('resultat').value + "9"
});
$('zero').addEventListener('click',function(){
    $('resultat').value = $('resultat').value + "0"
});
$('addition').addEventListener('click',function(){
    nbr1 = $('resultat').value
    op="+"
    $('resultat').value = ""
});
$('soustraction').addEventListener('click',function(){
    nbr1 = $('resultat').value
    op="-"
    $('resultat').value = ""
});
$('multiplication').addEventListener('click',function(){
    nbr1 = $('resultat').value
    op="x"
    $('resultat').value = ""
});
$('division').addEventListener('click',function(){
    nbr1 = $('resultat').value
    op="/"
    $('resultat').value = ""
});
$('retour').addEventListener('click',function(){
    $('resultat').value = $('resultat').value.slice(0,-1)
});
$('modulo').addEventListener('click',function(){
    nbr1 = $('resultat').value
    op="mod"
    $('resultat').value = ""
});
$('factorielle').addEventListener('click',function(){
    nbr1 = parseInt($('resultat').value)
    let result = 1;
    for (let i=1;i<nbr1 +1;i++){
        result*= i
    }
    $('resultat').value = result
});
$('clear').addEventListener('click',function(){
    $('resultat').value = ""
});
$('expo').addEventListener('click',function(){
    $('resultat').value = $('resultat').value + "e+0"
    op = "exp"
});
$('virgule').addEventListener('click',function(){
    $('resultat').value = $('resultat').value + "."
});
$('e').addEventListener('click',function(){
    $('resultat').value = "2.7182818284590452353602874713527"
});
$('absolue').addEventListener('click',function(){
    if ($('resultat').value[0] == "-") {
        $('resultat').value = $('resultat').value.substring(1,$('resultat').value.length + 1)
    }
});
$('par2').addEventListener('click',function(){
    $('resultat').value = $('resultat').value + ")"
});
$('par1').addEventListener('click',function(){
    $('resultat').value = $('resultat').value + "("
});
$('inverse').addEventListener('click',function(){
    nbr1= $('resultat').value
    let result = 1/parseFloat(nbr1)
    $('resultat').value = result
});
$('negation').addEventListener('click',function(){
    if ($('resultat').value[0] == "-") {
        $('resultat').value = $('resultat').value.substring(1,$('resultat').value.length + 1)
    }
    else {
        $('resultat').value = "-" + $('resultat').value 
    }
});
$('ln').addEventListener('click',function(){
    nbr1 = parseFloat($('resultat').value)
    $('resultat').value = Math.log(nbr1)
});
$('log').addEventListener('click',function(){
    nbr1 = parseFloat($('resultat').value)
    $('resultat').value = Math.log10(nbr1)
});
$('puiss de dix').addEventListener('click',function(){
    nbr1 = parseFloat($('resultat').value)
    nbr1 = 10**nbr1
    $('resultat').value = nbr1
});
$('puissance').addEventListener('click',function(){
    nbr1 = $('resultat').value
    $('resultat').value = ""
});
$('racine carre').addEventListener('click',function(){
    nbr1 = parseFloat($('resultat').value)
    nbr1 = Math.sqrt(nbr1)
    $('resultat').value = nbr1
});
$('carre').addEventListener('click',function(){
    nbr1 = parseFloat($('resultat').value)
    nbr1 *= nbr1
    $('resultat').value = nbr1
});
$('pi').addEventListener('click',function(){
    $('resultat').value = "3.1415926535897932384626433832795"
});
$('egal').addEventListener('click',function(){
    nbr2 = $('resultat').value
    let result;
    switch(op) {
        case "+" :
            result = parseFloat(nbr1) + parseFloat(nbr2)
            $('resultat').value = result
            break;
        case "-" :
            result = parseFloat(nbr1) - parseFloat(nbr2)
            $('resultat').value = result
            break;
        case "x" :
            result = parseFloat(nbr1) * parseFloat(nbr2)
            $('resultat').value = result
            break;
        case "/" :
            result = parseFloat(nbr1) / parseFloat(nbr2)
            $('resultat').value = result
            break;
        case "mod":
            result = parseFloat(nbr1) % parseFloat(nbr2)
            $('resultat').value = result
            break;
        case "exp":
            result = parseFloat($('resultat').value)
            $('resultat').value = result
            break;
    }
});
</script>
</html>
